<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia — The Last of Us</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="home-container">
        <div class="home-background">
            <img src="capa.png" alt="Background The Last of Us" class="home-bg-image">
        </div>

        <div class="home-content">
            <h1 class="home-title">THE LAST OF US</h1>
            <p class="home-subtitle">Escolha uma parte para explorar</p>

            <div class="game-buttons">
                <a href="parte1.html" class="game-button">
                    <img src="tlou1.png" alt="The Last of Us Part I" class="game-button-image">
                    <div class="game-button-overlay"></div>
                    <div class="game-button-content">
                        <span class="game-button-number">I</span>
                        <span class="game-button-text">PARTE I</span>
                        <span class="game-button-year">2013</span>
                    </div>
                </a>

                <a href="parte2.html" class="game-button">
                    <img src="tlou2.png" alt="The Last of Us Part II" class="game-button-image">
                    <div class="game-button-overlay"></div>
                    <div class="game-button-content">
                        <span class="game-button-number">II</span>
                        <span class="game-button-text">PARTE II</span>
                        <span class="game-button-year">2020</span>
                    </div>
                </a>
            </div>
        </div>
    </main>
</body>
</html>
